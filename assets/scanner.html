<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMPass - Scanner de QR Code</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            color: #F8FAFC;
        }
        .container {
            width: 90%;
            max-width: 450px;
            background: #FFFFFF;
            padding: 35px;
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: #1E293B;
        }
        h1 { color: #6366F1; font-size: 32px; font-weight: 800; margin: 0 0 5px 0; }
        .subtitle { color: #94A3B8; font-size: 11px; font-weight: 700; letter-spacing: 2px; margin-bottom: 25px; }
        p { color: #64748B; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        #reader { 
            width: 100%; 
            min-height: 250px;
            border-radius: 20px; 
            overflow: hidden;
            border: 2px dashed #E2E8F0 !important;
            background: #F8FAFC;
        }
        #reader video {
            width: 100% !important;
            height: auto !important;
            border-radius: 20px !important;
            object-fit: cover;
        }
        #reader__dashboard_section_csr button {
            background: #6366F1 !important;
            color: white !important;
            border: none !important;
            padding: 12px 24px !important;
            border-radius: 12px !important;
            cursor: pointer !important;
            font-weight: 700 !important;
            font-size: 14px !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
            transition: all 0.3s ease !important;
        }
        #reader__dashboard_section_csr button:hover {
            background: #4F46E5 !important;
            transform: translateY(-2px) !important;
        }
        .status {
            margin-top: 25px;
            padding: 15px;
            border-radius: 12px;
            background: #F0FDF4;
            color: #16A34A;
            font-weight: 700;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MMPass</h1>
        <div class="subtitle">VALIDAÇÃO DE ACESSO</div>
        <p>Aponte a câmera para o QR Code do ingresso para realizar a validação instantânea.</p>
        <div id="reader"></div>
        <div class="status" id="status">✔ Código lido! Validando ingresso...</div>
    </div>

    <script>
        // Pega o ID do evento da URL atual
        const urlParams = new URLSearchParams(window.location.search);
        const eventoId = urlParams.get('evento_id');
        let isScanned = false;

        // Segurança: Câmera só funciona em HTTPS ou Localhost
        if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
            alert("AVISO: A câmera pode não abrir porque você não está usando uma conexão segura (HTTPS). Se estiver no Render, certifique-se de acessar via https://");
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (isScanned) return;
            isScanned = true;

            const statusEl = document.getElementById('status');
            statusEl.style.display = 'block';
            statusEl.innerText = "✔ Código lido! Validando ingresso...";
            
            // Redireciona de volta para o app Flet passando o código e o ID do evento
            // Lógica robusta para encontrar a raiz do app (removendo assets/scanner.html do path)
            const currentPath = window.location.pathname;
            const basePath = currentPath.substring(0, currentPath.lastIndexOf('/assets/')) || "";
            const backUrl = window.location.origin + basePath + "/?code=" + encodeURIComponent(decodedText) + "&evento_id=" + eventoId;
            
            setTimeout(() => {
                window.location.href = backUrl;
            }, 600);

        }


        function onScanFailure(error) {
            // Silencioso por padrão, mas pode ser útil para debug
            // console.warn(`Code scan error = ${error}`);
        }

        async function startScanner() {
            try {
                const cameras = await Html5Qrcode.getCameras();
                if (cameras && cameras.length > 0) {
                    let html5QrcodeScanner = new Html5QrcodeScanner(
                        "reader",
                        { 
                            fps: 20, 
                            qrbox: {width: 250, height: 250},
                            aspectRatio: 1.0,
                            rememberLastUsedCamera: true,
                            supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
                        },
                        /* verbose= */ false);
                    
                    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
                } else {
                    alert("Nenhuma câmera encontrada no seu dispositivo.");
                }
            } catch (err) {
                console.error("Erro ao iniciar scanner:", err);
                alert("Erro ao acessar a câmera. Verifique se deu permissão no navegador.");
            }
        }

        // Inicia o processo
        startScanner();

    </script>

</body>
</html>
